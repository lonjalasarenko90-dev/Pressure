<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  canvas { display:block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="630" height="500"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 630, H = 500;

function draw() {
  // BG
  const bg = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H/2, W*0.8);
  bg.addColorStop(0, '#041828');
  bg.addColorStop(0.5, '#020e1a');
  bg.addColorStop(1, '#010810');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(0,180,255,0.04)';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<H; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // ===== BOTTLE =====
  const bX = W/2 - 72, bW = 144;
  const bTop = 55, bBot = H - 55;
  const bH = bBot - bTop;

  // Water fill gradient
  const wg = ctx.createLinearGradient(bX, bTop, bX, bBot);
  wg.addColorStop(0, 'rgba(0,50,100,0.92)');
  wg.addColorStop(0.45, 'rgba(0,30,80,0.97)');
  wg.addColorStop(1, 'rgba(0,70,120,0.92)');
  ctx.fillStyle = wg;
  ctx.beginPath();
  roundRect(ctx, bX, bTop, bW, bH, 14);
  ctx.fill();

  // Water glow layers
  for(let i=3;i>0;i--) {
    ctx.strokeStyle = `rgba(0,200,255,${0.06*i})`;
    ctx.lineWidth = i*4;
    ctx.beginPath();
    roundRect(ctx, bX, bTop, bW, bH, 14);
    ctx.stroke();
  }
  // Bottle border
  ctx.strokeStyle = 'rgba(0,220,255,0.45)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  roundRect(ctx, bX, bTop, bW, bH, 14);
  ctx.stroke();

  // Glass highlight
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.beginPath();
  roundRect(ctx, bX+6, bTop+6, bW*0.14, bH-12, 6);
  ctx.fill();

  // Bubbles inside bottle
  const bubbles = [
    {x:bX+22,y:bTop+80,r:3},{x:bX+55,y:bTop+150,r:2},
    {x:bX+90,y:bTop+60,r:3.5},{x:bX+115,y:bTop+200,r:2},
    {x:bX+35,y:bTop+230,r:2.5},{x:bX+100,y:bTop+310,r:2},
  ];
  bubbles.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,240,255,0.3)';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  // Wave lines
  for(let w=0;w<3;w++){
    ctx.beginPath();
    const wy=bTop+22+w*9;
    for(let x=bX+4;x<=bX+bW-4;x+=3){
      const y=wy+Math.sin(x*0.08+w)*4;
      x===bX+4?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(0,200,255,${0.08-w*0.02})`;
    ctx.lineWidth=1.5;
    ctx.stroke();
  }

  // Cap
  const capW=70, capH=22, capX=W/2-35;
  ctx.fillStyle='rgba(0,80,130,0.95)';
  ctx.beginPath();
  roundRect(ctx, capX, bTop-capH+6, capW, capH, [8,8,0,0]);
  ctx.fill();
  ctx.strokeStyle='rgba(0,200,255,0.5)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // ===== DIVER (pipette) — center, slightly below middle =====
  const dX = W/2, dY = H*0.47;
  const dS = 32; // scale

  // Trail
  for(let i=6;i>0;i--){
    const tr=dS*(i/6)*0.5;
    ctx.beginPath();
    ctx.arc(dX, dY+i*5, tr, 0, Math.PI*2);
    ctx.fillStyle=`rgba(0,255,255,${0.04*i})`;
    ctx.fill();
  }

  // Glow halo
  const hg = ctx.createRadialGradient(dX,dY,0,dX,dY,dS*1.8);
  hg.addColorStop(0,'rgba(0,255,255,0.18)');
  hg.addColorStop(1,'rgba(0,255,255,0)');
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.arc(dX,dY,dS*1.8,0,Math.PI*2);
  ctx.fill();

  // Rubber bulb
  ctx.shadowBlur=22; ctx.shadowColor='#00ffff';
  ctx.beginPath();
  ctx.ellipse(dX, dY-dS*0.3, dS*0.55, dS*0.55, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,255,255,0.18)';
  ctx.fill();
  ctx.strokeStyle='#00ffff';
  ctx.lineWidth=2;
  ctx.stroke();

  // Air bubble (partially compressed)
  ctx.beginPath();
  ctx.arc(dX, dY-dS*0.3, dS*0.22, 0, Math.PI*2);
  ctx.fillStyle='rgba(200,240,255,0.2)';
  ctx.fill();

  // Water in bulb
  ctx.beginPath();
  ctx.ellipse(dX, dY-dS*0.1, dS*0.4, dS*0.32, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,120,220,0.3)';
  ctx.fill();

  // Stem
  ctx.beginPath();
  ctx.roundRect(dX-5, dY+dS*0.1, 10, dS*0.6, 2);
  ctx.fillStyle='rgba(180,240,255,0.08)';
  ctx.fill();
  ctx.strokeStyle='rgba(0,255,255,0.5)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Tip
  ctx.beginPath();
  ctx.moveTo(dX-4,dY+dS*0.7); ctx.lineTo(dX+4,dY+dS*0.7);
  ctx.lineTo(dX+1.5,dY+dS*0.88); ctx.lineTo(dX-1.5,dY+dS*0.88);
  ctx.closePath();
  ctx.fillStyle='#00ffff';
  ctx.fill();
  ctx.shadowBlur=0;

  // ===== DEPTH / PRESSURE side bars =====
  // Right depth bar
  ctx.fillStyle='rgba(0,255,255,0.04)';
  ctx.beginPath();
  ctx.roundRect(bX+bW+16, bTop, 6, bH, 3);
  ctx.fill();
  ctx.strokeStyle='rgba(0,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.stroke();
  // Fill ~50%
  const fillH=bH*0.5;
  const dg=ctx.createLinearGradient(0,bBot-fillH,0,bBot);
  dg.addColorStop(0,'#00ffff'); dg.addColorStop(1,'#0060ff');
  ctx.fillStyle=dg;
  ctx.shadowBlur=8; ctx.shadowColor='#00ffff';
  ctx.beginPath();
  ctx.roundRect(bX+bW+16, bBot-fillH, 6, fillH, 2);
  ctx.fill();
  ctx.shadowBlur=0;

  // ===== TITLE =====
  // "PRESSURE" — big, neon
  ctx.save();
  ctx.font = "900 72px 'Arial Black', Arial, sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = '6px';

  // Glow layers
  for(let g=5;g>0;g--){
    ctx.shadowBlur=g*12;
    ctx.shadowColor='rgba(0,200,255,0.6)';
    ctx.fillStyle=`rgba(0,200,255,${0.04*g})`;
    ctx.fillText('PRESSURE', W/2, 30);
  }
  // Main text gradient
  const tg=ctx.createLinearGradient(W/2-180,0,W/2+180,0);
  tg.addColorStop(0,'#00e8ff');
  tg.addColorStop(0.5,'#ffffff');
  tg.addColorStop(1,'#00aaff');
  ctx.fillStyle=tg;
  ctx.shadowBlur=25;
  ctx.shadowColor='#00ccff';
  ctx.fillText('PRESSURE', W/2, 30);
  ctx.restore();

  // Subtitle
  ctx.save();
  ctx.font = "13px 'Courier New', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,220,255,0.55)';
  ctx.letterSpacing = '4px';
  ctx.fillText('A  CARTESIAN  DIVER  GAME', W/2, 52);
  ctx.restore();

  // ===== 4 MODE ICONS — bottom strip =====
  const modes = [
    { icon:'🎯', label:'PRECISION' },
    { icon:'⚡', label:'OBSTACLES' },
    { icon:'🔬', label:'3 DIVERS' },
    { icon:'⏱', label:'SPRINT' },
  ];
  const stripY = H - 44;
  // Strip bg
  ctx.fillStyle='rgba(0,20,40,0.7)';
  ctx.beginPath();
  ctx.roundRect(40, stripY-14, W-80, 42, 8);
  ctx.fill();
  ctx.strokeStyle='rgba(0,180,255,0.2)';
  ctx.lineWidth=1;
  ctx.stroke();

  modes.forEach((m,i)=>{
    const mx = 40 + (W-80)/4*i + (W-80)/8;
    ctx.font='18px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(m.icon, mx, stripY+2);
    ctx.font="bold 9px 'Courier New', monospace";
    ctx.fillStyle='rgba(0,220,255,0.5)';
    ctx.letterSpacing='2px';
    ctx.fillText(m.label, mx, stripY+18);
  });

  // Neon Void badge — top right
  ctx.save();
  ctx.font="bold 10px 'Courier New', monospace";
  ctx.textAlign='right';
  ctx.textBaseline='top';
  ctx.fillStyle='rgba(0,180,255,0.35)';
  ctx.fillText('⬡ NEON VOID STUDIO', W-18, 14);
  ctx.restore();

  // Physics hint — bottom left of bottle
  ctx.save();
  ctx.font="10px 'Courier New', monospace";
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,255,136,0.4)';
  ctx.fillText('HOLD → SINK', bX - 90, H*0.55);
  ctx.fillStyle='rgba(0,255,255,0.35)';
  ctx.fillText('RELEASE → FLOAT', bX - 90, H*0.55+18);
  // Arrow
  ctx.strokeStyle='rgba(0,255,136,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(bX-4, H*0.55+4);
  ctx.lineTo(bX-10, H*0.55+4);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Right label — Archimedes
  ctx.save();
  ctx.font="10px 'Courier New', monospace";
  ctx.textAlign='right';
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,200,255,0.3)';
  ctx.fillText('ARCHIMEDES', bX+bW+50, H*0.35);
  ctx.fillText("PASCAL'S LAW", bX+bW+50, H*0.35+16);
  ctx.fillText('BUOYANCY', bX+bW+50, H*0.35+32);
  ctx.restore();

  // Scan line overlay
  for(let y=0;y<H;y+=3){
    ctx.fillStyle='rgba(0,0,0,0.06)';
    ctx.fillRect(0,y,W,1);
  }

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
}

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number') r=[r,r,r,r];
  ctx.moveTo(x+r[0],y);
  ctx.arcTo(x+w,y,x+w,y+h,r[1]||r[0]);
  ctx.arcTo(x+w,y+h,x,y+h,r[2]||r[0]);
  ctx.arcTo(x,y+h,x,y,r[3]||r[0]);
  ctx.arcTo(x,y,x+w,y,r[0]);
}

draw();
</script>
</body>
</html>
